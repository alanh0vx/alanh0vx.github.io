<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CoolShop — 盡情購物，結帳永遠免費</title>
  <meta name="description" content="CoolShop — a virtual shopping experience: browse, search, fill your cart and check out for free. 盡情購物，結帳永遠免費。">
  <meta name="theme-color" content="#84bd00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/desktop.css">
</head>
<body data-theme="hktv" data-layout="mobile">
  <script>
    /* Set layout mode before first paint to avoid a flash of mobile chrome on desktop. */
    document.body.setAttribute('data-layout',
      window.matchMedia('(min-width: 1024px)').matches ? 'desktop' : 'mobile');
  </script>
  <header id="topbar"></header>
  <main id="app"></main>
  <nav id="bottomnav"></nav>
  <div id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/views.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
